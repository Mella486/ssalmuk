<style>
:root{
  --bg:#0b0c0e;--bg2:#13141a;--bg3:#1c1e27;--bg4:#22242f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#c6f135;--text:#f0f0f2;--muted:#7a7d8a;
  --red:#f87171;--green:#4ade80;--blue:#60a5fa;
  --cr:14px;--px:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;-webkit-text-size-adjust:100%;overflow-x:hidden;}

/* ── LOADING ── */
.loading-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-logo{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--accent);}
.loading-bar{width:160px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.loading-fill{height:100%;background:var(--accent);border-radius:2px;animation:loadfill 1.5s ease-in-out infinite;}
@keyframes loadfill{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.loading-text{font-size:12px;color:var(--muted);}

header{position:sticky;top:0;z-index:100;background:rgba(11,12,14,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 var(--px);display:flex;align-items:center;justify-content:space-between;height:50px;gap:8px;}
.logo{display:flex;align-items:baseline;gap:7px;flex-shrink:1;min-width:0;overflow:hidden;}
.logo-main{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--accent);white-space:nowrap;}
.logo-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(198,241,53,.08);border:1px solid rgba(198,241,53,.2);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--accent);font-weight:700;white-space:nowrap;}
.live-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.btn-submit{background:var(--accent);color:#0b0c0e;border:none;border-radius:8px;padding:7px 12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.btn-submit:active{opacity:.8;}

.hero{padding:18px var(--px) 12px;display:flex;flex-direction:column;gap:12px;}
.hero-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(22px,7vw,40px);line-height:1.15;}
.hero-title span{color:var(--accent);}
.hero-desc{font-size:12px;color:var(--muted);}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 6px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,4.5vw,24px);color:var(--accent);letter-spacing:1px;line-height:1;}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;}

.controls{padding:0 var(--px) 12px;display:flex;align-items:center;gap:7px;justify-content:flex-end;}
.sort-label{font-size:12px;color:var(--muted);white-space:nowrap;}
.sort-select{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;outline:none;-webkit-appearance:none;appearance:none;}

.chart-wrap{margin:0 var(--px) 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--cr);padding:14px 10px;}
.section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.chart-legend{display:flex;gap:12px;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.chart-canvas-wrap{position:relative;width:100%;}

.ad-banner{margin:0 var(--px) 14px;background:var(--bg2);border:1px dashed rgba(255,255,255,.1);border-radius:var(--cr);min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px;}
.ad-tag{font-size:9px;letter-spacing:1.8px;color:rgba(255,255,255,.16);font-weight:700;text-transform:uppercase;}
.ad-text{font-size:12px;color:rgba(255,255,255,.16);}

.grid{display:grid;grid-template-columns:1fr;gap:10px;padding:0 var(--px) 36px;}

.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--cr);padding:14px;position:relative;overflow:hidden;}
.card-rank{position:absolute;top:10px;right:12px;font-family:'Bebas Neue',sans-serif;font-size:26px;color:rgba(255,255,255,.04);line-height:1;pointer-events:none;user-select:none;}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.game-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);}
.game-info{flex:1;min-width:0;}
.name-row{display:flex;align-items:center;gap:7px;min-width:0;}
.game-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.comm-btn{display:flex;align-items:center;gap:4px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:3px 7px 3px 5px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s,background .15s;white-space:nowrap;}
.comm-btn:active{transform:scale(.96);}
.comm-btn:hover{background:var(--bg4);border-color:rgba(255,255,255,.18);}
.comm-btn.act-warm{border-color:rgba(251,146,60,.3);}
.comm-btn.act-hot{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.06);}
.comm-btn.act-hot .cb-icon{animation:hotpulse 1.8s infinite;}
@keyframes hotpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.cb-icon{line-height:1;font-size:12px;}
.cb-count{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.3px;color:var(--muted);line-height:1;}
.comm-btn.act-warm .cb-count{color:#fb923c;}
.comm-btn.act-hot .cb-count{color:#f87171;}
.game-tag{display:inline-block;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:9px;padding:1px 6px;border-radius:4px;margin-top:3px;}

.wage-section{margin-bottom:10px;}
.wage-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.wage-lbl{font-size:10px;color:var(--muted);width:22px;flex-shrink:0;font-weight:700;}
.bar-wrap{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:0;}
.bar{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.bar.beg{background:rgba(198,241,53,.3);}
.bar.exp{background:var(--accent);}
.wage-val{font-family:'Bebas Neue',sans-serif;font-size:13px;width:60px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px;}
.wage-val.exp{color:var(--accent);}

.job-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:9px;min-width:0;}
.job-icon{font-size:16px;flex-shrink:0;line-height:1;}
.job-text{flex:1;min-width:0;}
.job-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-desc{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;white-space:nowrap;}

.trust-row{display:flex;align-items:center;gap:6px;margin-bottom:9px;}
.trust-lbl{font-size:10px;color:var(--muted);font-weight:700;flex-shrink:0;width:30px;}
.trust-bar-wrap{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;min-width:0;}
.trust-bar{height:100%;border-radius:2px;transition:width .4s;}
.trust-pct{font-family:'Bebas Neue',sans-serif;font-size:13px;flex-shrink:0;width:32px;text-align:right;}
.vote-cnt{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;width:38px;text-align:right;}

.vote-row{display:flex;gap:7px;padding-top:9px;border-top:1px solid var(--border);}
.vote-btn{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:var(--muted);-webkit-tap-highlight-color:transparent;word-break:keep-all;line-height:1.3;text-align:center;}
.vote-btn:active{transform:scale(.97);}
.vote-btn.voted-up{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:var(--green);}
.vote-btn.voted-down{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red);}
.vote-icon{font-size:13px;flex-shrink:0;}

.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:18px var(--px) calc(18px + env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--accent);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.fg{margin-bottom:11px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
.fi,.fs{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:16px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.fi:focus,.fs:focus{border-color:rgba(198,241,53,.4);}
.frow{display:flex;gap:8px;}
.frow .fg{flex:1;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.btn-cancel{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer;}
.btn-ok{flex:2;background:var(--accent);border:none;border-radius:8px;padding:12px;color:#0b0c0e;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-ok:active{opacity:.85;}

.comm-overlay{display:none;position:fixed;inset:0;z-index:210;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:flex-end;justify-content:center;}
.comm-overlay.open{display:flex;}
.comm-sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.comm-header{padding:14px var(--px) 0;flex-shrink:0;}
.comm-handle{width:36px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 14px;}
.comm-title-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.comm-game-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;}
.comm-title{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.comm-close{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;-webkit-tap-highlight-color:transparent;}
.comm-stats-bar{display:flex;align-items:center;gap:10px;padding:8px 0 12px;border-bottom:1px solid var(--border);}
.comm-stat{font-size:11px;color:var(--muted);}
.comm-stat span{color:var(--text);font-weight:700;}
.comm-hot-tag{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;color:#f87171;}
.comm-posts{flex:1;overflow-y:auto;padding:0 var(--px);-webkit-overflow-scrolling:touch;}
.comm-empty{padding:40px 0;text-align:center;color:var(--muted);font-size:13px;}
.post-item{padding:12px 0;border-bottom:1px solid var(--border);}
.post-item:last-child{border-bottom:none;}
.post-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.post-avatar{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;}
.post-nick{font-size:12px;font-weight:700;}
.post-time{font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0;}
.post-body{font-size:13px;line-height:1.6;color:var(--text);word-break:break-all;margin-bottom:7px;}
.post-actions{display:flex;align-items:center;gap:8px;}
.post-like-btn{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:11px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}
.post-like-btn:active{transform:scale(.96);}
.post-like-btn.liked{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red);}
.post-like-count{font-family:'Bebas Neue',sans-serif;font-size:13px;}
.comm-write{flex-shrink:0;padding:12px var(--px) calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--bg2);}
.write-row{display:flex;gap:8px;align-items:flex-end;}
.write-ta{flex:1;min-width:0;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;resize:none;outline:none;line-height:1.5;max-height:90px;overflow-y:auto;-webkit-appearance:none;}
.write-ta:focus{border-color:rgba(198,241,53,.35);}
.write-ta::placeholder{color:var(--muted);}
.write-send{flex-shrink:0;width:42px;height:42px;background:var(--accent);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.write-send:active{opacity:.8;}
.write-send svg{width:18px;height:18px;fill:none;stroke:#0b0c0e;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.write-anon{font-size:10px;color:var(--muted);margin-top:6px;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg2);border:1px solid var(--accent);border-radius:10px;padding:9px 16px;font-size:13px;color:var(--accent);z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(min-width:600px){:root{--px:20px;}.grid{grid-template-columns:repeat(2,1fr);}.stat-val{font-size:22px;}}
@media(min-width:960px){
  :root{--px:28px;}
  .grid{grid-template-columns:repeat(3,1fr);}
  .modal-overlay,.comm-overlay{align-items:center;}
  .modal,.comm-sheet{border-radius:16px;width:min(500px,92vw);max-height:85vh;}

async function loadData(){
  try{
    // 게임 데이터
    const gSnap=await db.collection('games').get();
    if(gSnap.empty){
      // 최초 실행: 기본 데이터 저장
      const batch=db.batch();
      DEFAULT.forEach(g=>batch.set(db.collection('games').doc(g.id),g));
      await batch.commit();
      games=JSON.parse(JSON.stringify(DEFAULT));
    }else{
      games=gSnap.docs.map(d=>({...d.data(),id:d.id}));
    }

    // 게시글 데이터
    const pSnap=await db.collection('posts').get();
    posts={};
    if(pSnap.empty){
      // 최초 실행: 시드 게시글 저장
      const batch=db.batch();
      Object.entries(SEED_POSTS).forEach(([gid,list])=>{
        list.forEach(p=>batch.set(db.collection('posts').doc(p.id),{...p,gameId:gid}));
      });
      await batch.commit();
      posts=JSON.parse(JSON.stringify(SEED_POSTS));
    }else{
      pSnap.docs.forEach(d=>{
        const data={...d.data(),id:d.id};
        if(!posts[data.gameId])posts[data.gameId]=[];
        posts[data.gameId].push(data);
      });
    }

    // 내 투표 기록은 로컬에 저장 (로그인 없이 사용자 구분)
    myVotes=lsGet('ssalmuk_votes',{});
    myPostLikes=lsGet('ssalmuk_postlikes',{});
  }catch(e){
    console.error('loadData error:',e);
    games=JSON.parse(JSON.stringify(DEFAULT));
    posts=JSON.parse(JSON.stringify(SEED_POSTS));
    myVotes=lsGet('ssalmuk_votes',{});
    myPostLikes=lsGet('ssalmuk_postlikes',{});
  }
}

function getSorted(){
  const s=document.getElementById('sortSelect').value;
  const list=[...games];
  if(s==='expert')   list.sort((a,b)=>b.expert-a.expert);
  if(s==='beginner') list.sort((a,b)=>b.beginner-a.beginner);
  if(s==='trust')    list.sort((a,b)=>trustPct(b)-trustPct(a));
  if(s==='votes')    list.sort((a,b)=>(b.upVotes+b.downVotes)-(a.upVotes+a.downVotes));
  return list;
}

            <button class="comm-btn act-${act}" onclick="openComm('${g.id}')">
              <span class="cb-icon">${actIcon(pc)}</span>
              <span class="cb-count">${fmtCount(pc)}</span>
            </button>
          </div>
          <span class="game-tag">${g.tag}</span>
        </div>
      </div>
      <div class="wage-section">
        <div class="wage-row">
          <span class="wage-lbl">초보</span>
          <div class="bar-wrap"><div class="bar beg" style="width:${Math.round(g.beginner/maxW*100)}%"></div></div>
          <span class="wage-val">${fmtW(g.beginner)}</span>
        </div>
        <div class="wage-row">
          <span class="wage-lbl">고수</span>
          <div class="bar-wrap"><div class="bar exp" style="width:${Math.round(g.expert/maxW*100)}%"></div></div>
          <span class="wage-val exp">${fmtW(g.expert)}</span>
        </div>
      </div>
      <div class="job-box">
        <span class="job-icon">${job.icon}</span>
        <div class="job-text"><div class="job-name">${job.name}</div><div class="job-desc">${job.desc}</div></div>
        <span class="job-badge" style="background:${job.bg};color:${job.color}">고수기준</span>
      </div>
      <div class="trust-row">
        <span class="trust-lbl">신뢰도</span>
        <div class="trust-bar-wrap"><div class="trust-bar" style="width:${tp}%;background:${tColor(tp)}"></div></div>
        <span class="trust-pct" style="color:${tColor(tp)}">${tp}%</span>
        <span class="vote-cnt">${totalV.toLocaleString()}표</span>
      </div>
      <div class="vote-row">
        <button class="vote-btn ${myV==='up'?'voted-up':''}" onclick="vote('${g.id}','up')">
          <span class="vote-icon">👍</span><span>${g.upVotes.toLocaleString()} 맞아요</span>
        </button>
        <button class="vote-btn ${myV==='down'?'voted-down':''}" onclick="vote('${g.id}','down')">
          <span class="vote-icon">👎</span><span>${g.downVotes.toLocaleString()} 아닌듯</span>
        </button>
      </div>`;
    grid.appendChild(el);
  });
}
function renderAll(){renderStats();renderChart();renderCards();}

// ── 투표 ──
async function vote(id,dir){
  const g=games.find(x=>x.id===id);if(!g)return;
  const prev=myVotes[id];
  if(prev===dir){
    if(dir==='up')g.upVotes=Math.max(0,g.upVotes-1);
    else g.downVotes=Math.max(0,g.downVotes-1);
    delete myVotes[id];showToast('투표를 취소했습니다.');
  }else{
    if(prev==='up')g.upVotes=Math.max(0,g.upVotes-1);
    if(prev==='down')g.downVotes=Math.max(0,g.downVotes-1);
    if(dir==='up'){g.upVotes++;showToast('👍 신뢰 +1 반영됐습니다!');}
    else{g.downVotes++;showToast('👎 의심 +1 반영됐습니다.');}
    myVotes[id]=dir;
  }
  lsSet('ssalmuk_votes',myVotes);
  // Firestore 업데이트
  await db.collection('games').doc(id).update({upVotes:g.upVotes,downVotes:g.downVotes});
  renderAll();
}

// ── 제보 모달 ──
function openReportModal(){document.getElementById('reportOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeReportModal(){document.getElementById('reportOverlay').classList.remove('open');document.body.style.overflow='';}
function closeReportOut(e){if(e.target===document.getElementById('reportOverlay'))closeReportModal();}
async function submitReport(){
  const name=document.getElementById('fName').value.trim();
  const tag=document.getElementById('fTag').value;
  const beg=parseInt(document.getElementById('fBeg').value)||0;
  const exp=parseInt(document.getElementById('fExp').value)||0;
  const icon=document.getElementById('fIcon').value.trim()||'🎮';
  if(!name){showToast('⚠️ 게임 이름을 입력해주세요.');return;}
  if(exp<=0){showToast('⚠️ 고수 시급을 입력해주세요.');return;}
  const existing=games.find(g=>g.name===name);
  if(existing){
    existing.beginner=Math.round((existing.beginner+beg)/2);
    existing.expert=Math.round((existing.expert+exp)/2);
    await db.collection('games').doc(existing.id).update({beginner:existing.beginner,expert:existing.expert});
    showToast('✅ 기존 데이터에 반영됐습니다!');
  }else{
    const newGame={id:'u-'+Date.now(),name,icon,tag,beginner:beg,expert:exp,upVotes:1,downVotes:0,ts:Date.now()};
    games.push(newGame);
    await db.collection('games').doc(newGame.id).set(newGame);
    showToast('🌾 제보 등록 완료!');
  }
  ['fName','fBeg','fExp','fIcon'].forEach(id=>document.getElementById(id).value='');
  closeReportModal();renderAll();
}

// ── 커뮤니티 ──
function openComm(gid){
  commGameId=gid;
  const g=games.find(x=>x.id===gid);if(!g)return;
  document.getElementById('cIcon').textContent=g.icon||'🎮';
  document.getElementById('cTitle').textContent=g.name+' 커뮤니티';
  renderCommStats(gid);renderPosts(gid);
  document.getElementById('writeTa').value='';
  document.getElementById('commOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeComm(){document.getElementById('commOverlay').classList.remove('open');document.body.style.overflow='';commGameId=null;}
function closeCommOut(e){if(e.target===document.getElementById('commOverlay'))closeComm();}
function renderCommStats(gid){
  const list=posts[gid]||[];
  const tl=totalLikes(gid),hot=list.length>=15;
  document.getElementById('cStatsBar').innerHTML=`
    <span class="comm-stat">글 <span>${list.length}</span></span>
    <span class="comm-stat">공감 <span>${tl}</span></span>
    ${hot?'<span class="comm-hot-tag">🔥 HOT</span>':''}`;
}
function renderPosts(gid){
  const list=[...(posts[gid]||[])].sort((a,b)=>b.ts-a.ts);
  const container=document.getElementById('commPosts');
  if(!list.length){container.innerHTML='<div class="comm-empty">아직 글이 없어요.<br>첫 번째로 떠들어보세요 👋</div>';return;}
  container.innerHTML=list.map(p=>{
    const liked=!!myPostLikes[p.id];
    return `<div class="post-item">
      <div class="post-meta">
        <div class="post-avatar" style="background:${p.color}22;color:${p.color};">${p.nick.slice(-1)}</div>
        <span class="post-nick" style="color:${p.color}">${p.nick}</span>
        <span class="post-time">${timeAgo(p.ts)}</span>
      </div>
      <div class="post-body">${escHtml(p.body)}</div>
      <div class="post-actions">
        <button class="post-like-btn ${liked?'liked':''}" onclick="likePost('${p.id}')">
          <span>${liked?'❤️':'🤍'}</span>
          <span class="post-like-count">${p.likes}</span>
        </button>
      </div>
    </div>`;
  }).join('');
}
async function likePost(pid){
  const gid=commGameId;if(!gid)return;
  const list=posts[gid]||[];
  const post=list.find(p=>p.id===pid);if(!post)return;
  if(myPostLikes[pid]){post.likes=Math.max(0,post.likes-1);delete myPostLikes[pid];}
  else{post.likes++;myPostLikes[pid]=1;}
  lsSet('ssalmuk_postlikes',myPostLikes);
  await db.collection('posts').doc(pid).update({likes:post.likes});
  renderCommStats(gid);renderPosts(gid);renderCards();
}
async function submitPost(){
  const gid=commGameId;if(!gid)return;
  const ta=document.getElementById('writeTa');
  const body=ta.value.trim();
  if(!body){showToast('내용을 입력해주세요.');return;}
  if(body.length>300){showToast('300자 이내로 작성해주세요.');return;}
  const newPost={id:'p-'+Date.now(),nick:randNick(),color:randColor(),body,ts:Date.now(),likes:0,gameId:gid};
  if(!posts[gid])posts[gid]=[];
  posts[gid].push(newPost);
  await db.collection('posts').doc(newPost.id).set(newPost);
  ta.value='';ta.style.height='';
  renderCommStats(gid);renderPosts(gid);renderCards();
  document.getElementById('commPosts').scrollTop=0;
  showToast('✅ 글이 등록됐습니다!');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
let rTimer;
window.addEventListener('resize',()=>{clearTimeout(rTimer);rTimer=setTimeout(renderChart,180);});

// ── 시작 ──
(async()=>{
  await loadData();
  document.getElementById('loadingScreen').style.display='none';
  renderAll();
})();
</script>
