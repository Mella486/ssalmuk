<style>
:root{
  --bg:#0b0c0e;--bg2:#13141a;--bg3:#1c1e27;--bg4:#22242f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#c6f135;--text:#f0f0f2;--muted:#7a7d8a;
  --red:#f87171;--green:#4ade80;--blue:#60a5fa;
  --cr:14px;--px:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;-webkit-text-size-adjust:100%;overflow-x:hidden;}

/* ── LOADING ── */
.loading-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-logo{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--accent);}
.loading-bar{width:160px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.loading-fill{height:100%;background:var(--accent);border-radius:2px;animation:loadfill 1.5s ease-in-out infinite;}
@keyframes loadfill{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.loading-text{font-size:12px;color:var(--muted);}

header{position:sticky;top:0;z-index:100;background:rgba(11,12,14,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 var(--px);display:flex;align-items:center;justify-content:space-between;height:50px;gap:8px;}
.logo{display:flex;align-items:baseline;gap:7px;flex-shrink:1;min-width:0;overflow:hidden;}
.logo-main{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--accent);white-space:nowrap;}
.logo-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(198,241,53,.08);border:1px solid rgba(198,241,53,.2);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--accent);font-weight:700;white-space:nowrap;}
.live-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.btn-submit{background:var(--accent);color:#0b0c0e;border:none;border-radius:8px;padding:7px 12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.btn-submit:active{opacity:.8;}

.hero{padding:18px var(--px) 12px;display:flex;flex-direction:column;gap:12px;}
.hero-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(22px,7vw,40px);line-height:1.15;}
.hero-title span{color:var(--accent);}
.hero-desc{font-size:12px;color:var(--muted);}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.stat-pill{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 6px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,4.5vw,24px);color:var(--accent);letter-spacing:1px;line-height:1;}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;}

.controls{padding:0 var(--px) 12px;display:flex;align-items:center;gap:7px;justify-content:flex-end;}
.sort-label{font-size:12px;color:var(--muted);white-space:nowrap;}
.sort-select{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;outline:none;-webkit-appearance:none;appearance:none;}

.chart-wrap{margin:0 var(--px) 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--cr);padding:14px 10px;}
.section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.chart-legend{display:flex;gap:12px;margin-bottom:8px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.chart-canvas-wrap{position:relative;width:100%;}

.ad-banner{margin:0 var(--px) 14px;background:var(--bg2);border:1px dashed rgba(255,255,255,.1);border-radius:var(--cr);min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px;}
.ad-banner ins{width:100%;}
.ad-tag{font-size:9px;letter-spacing:1.8px;color:rgba(255,255,255,.16);font-weight:700;text-transform:uppercase;}
.ad-text{font-size:12px;color:rgba(255,255,255,.16);}

.grid{display:grid;grid-template-columns:1fr;gap:10px;padding:0 var(--px) 36px;}

.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--cr);padding:14px;position:relative;overflow:hidden;}
.card-rank{position:absolute;top:10px;right:12px;font-family:'Bebas Neue',sans-serif;font-size:26px;color:rgba(255,255,255,.04);line-height:1;pointer-events:none;user-select:none;}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.game-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);}
.game-info{flex:1;min-width:0;}
.name-row{display:flex;align-items:center;gap:7px;min-width:0;}
.game-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.comm-btn{display:flex;align-items:center;gap:4px;flex-shrink:0;background:var(--bg3);border:1.5px solid rgba(255,255,255,.1);border-radius:6px;padding:3px 7px 3px 5px;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.comm-btn:active{transform:scale(.96);}
@keyframes flash-cold{0%,100%{border-color:rgba(163,230,53,.12);}50%{border-color:rgba(163,230,53,.75);}}
@keyframes flash-warm{0%,100%{border-color:rgba(251,146,60,.12);}50%{border-color:rgba(251,146,60,.9);}}
@keyframes flash-hot{0%,100%{border-color:rgba(248,113,113,.12);}50%{border-color:rgba(248,113,113,.9);}}
.comm-btn.act-cold{animation:flash-cold 2.2s ease-in-out infinite;}
.comm-btn.act-cold .cb-count{color:#a3e635;}
.comm-btn.act-warm{animation:flash-warm 1.7s ease-in-out infinite;}
.comm-btn.act-warm .cb-count{color:#fb923c;}
.comm-btn.act-hot{animation:flash-hot 1.2s ease-in-out infinite;}
.comm-btn.act-hot .cb-count{color:#f87171;}
.cb-icon{line-height:1;font-size:12px;}
.cb-count{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.3px;color:var(--muted);line-height:1;}

/* inline-quote: 게임명과 comm-btn 사이, 남는 공간에 맞게 */
.comm-area{display:flex;align-items:center;gap:5px;flex-shrink:0;max-width:60%;min-width:0;}
.inline-quote{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}

.game-tag{display:inline-block;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:9px;padding:1px 6px;border-radius:4px;margin-top:3px;}

/* 아닌듯 경고 배지 */
.warn-badge{display:flex;align-items:center;gap:6px;border-radius:7px;padding:6px 9px;margin-bottom:9px;border:1px solid rgba(248,113,113,.22);background:rgba(248,113,113,.07);}
.warn-badge.lv1{border-color:rgba(251,191,36,.22);background:rgba(251,191,36,.07);}
.warn-txt{font-size:10px;font-weight:700;color:#f87171;}
.warn-badge.lv1 .warn-txt{color:#fbbf24;}

.wage-section{margin-bottom:10px;}
.wage-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.wage-lbl{font-size:10px;color:var(--muted);width:22px;flex-shrink:0;font-weight:700;}
.bar-wrap{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:0;}
.bar{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.bar.beg{background:rgba(198,241,53,.3);}
.bar.exp{background:var(--accent);}
.wage-val{font-family:'Bebas Neue',sans-serif;font-size:13px;width:60px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px;}
.wage-val.exp{color:var(--accent);}

.job-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:9px;min-width:0;}
.job-icon{font-size:16px;flex-shrink:0;line-height:1;}
.job-text{flex:1;min-width:0;}
.job-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-desc{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;white-space:nowrap;}

.trust-row{display:flex;align-items:center;gap:6px;margin-bottom:9px;}
.trust-lbl{font-size:10px;color:var(--muted);font-weight:700;flex-shrink:0;width:30px;}
.trust-bar-wrap{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;min-width:0;}
.trust-bar{height:100%;border-radius:2px;transition:width .4s;}
.trust-pct{font-family:'Bebas Neue',sans-serif;font-size:13px;flex-shrink:0;width:32px;text-align:right;}
.vote-cnt{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;width:38px;text-align:right;}

.vote-row{display:flex;gap:7px;padding-top:9px;border-top:1px solid var(--border);}
.vote-btn{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 4px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;color:var(--muted);-webkit-tap-highlight-color:transparent;word-break:keep-all;line-height:1.3;text-align:center;}
.vote-btn:active{transform:scale(.97);}
.vote-btn.voted-up{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:var(--green);}
.vote-btn.voted-down{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red);}
.vote-icon{font-size:13px;flex-shrink:0;}

.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:18px var(--px) calc(18px + env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--accent);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.fg{margin-bottom:11px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
.fi,.fs{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:16px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
.fi:focus,.fs:focus{border-color:rgba(198,241,53,.4);}
.frow{display:flex;gap:8px;}
.frow .fg{flex:1;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.btn-cancel{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer;}
.btn-ok{flex:2;background:var(--accent);border:none;border-radius:8px;padding:12px;color:#0b0c0e;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-ok:active{opacity:.85;}

.comm-overlay{display:none;position:fixed;inset:0;z-index:210;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:flex-end;justify-content:center;}
.comm-overlay.open{display:flex;}
.comm-sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.comm-header{padding:14px var(--px) 0;flex-shrink:0;}
.comm-handle{width:36px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 14px;}
.comm-title-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.comm-game-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;}
.comm-title{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.comm-close{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;-webkit-tap-highlight-color:transparent;}
.comm-stats-bar{display:flex;align-items:center;gap:10px;padding:8px 0 12px;border-bottom:1px solid var(--border);}
.comm-stat{font-size:11px;color:var(--muted);}
.comm-stat span{color:var(--text);font-weight:700;}
.comm-hot-tag{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;color:#f87171;}
.comm-posts{flex:1;overflow-y:auto;padding:0 var(--px);-webkit-overflow-scrolling:touch;}
.comm-empty{padding:40px 0;text-align:center;color:var(--muted);font-size:13px;}
.post-item{padding:12px 0;border-bottom:1px solid var(--border);}
.post-item:last-child{border-bottom:none;}
.post-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.post-avatar{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;}
.post-nick{font-size:12px;font-weight:700;}
.post-time{font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0;}
.post-body{font-size:13px;line-height:1.6;color:var(--text);word-break:break-all;margin-bottom:7px;}
.post-actions{display:flex;align-items:center;gap:8px;}
.post-like-btn{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:11px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}
.post-like-btn:active{transform:scale(.96);}
.post-like-btn.liked{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red);}
.post-like-count{font-family:'Bebas Neue',sans-serif;font-size:13px;}
.post-reply-btn{background:transparent;border:none;font-size:11px;color:var(--muted);cursor:pointer;padding:3px 6px;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}
.post-reply-btn:hover{color:var(--text);}
.post-mine-btn{background:transparent;border:none;font-size:10px;color:var(--muted);cursor:pointer;padding:3px 6px;font-family:'Noto Sans KR',sans-serif;}
.post-mine-btn:hover{color:var(--red);}
/* 답글 */
.reply-list{margin-top:6px;padding-left:14px;border-left:2px solid rgba(255,255,255,.08);}
.reply-item{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.reply-item:last-child{border-bottom:none;}
/* 답글 작성 인라인 */
.reply-write{display:none;flex-direction:column;gap:6px;margin-top:6px;padding-left:14px;}
.reply-write.open{display:flex;}
.reply-input-row{display:flex;gap:6px;align-items:flex-end;}
.reply-nick-pin{display:flex;gap:5px;margin-bottom:3px;}
.rni{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none;}
.rni:focus{border-color:rgba(198,241,53,.35);}
.reply-ta{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;resize:none;outline:none;font-family:'Noto Sans KR',sans-serif;max-height:60px;-webkit-appearance:none;}
.reply-ta:focus{border-color:rgba(198,241,53,.35);}
.reply-send{flex-shrink:0;width:36px;height:36px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.reply-send svg{width:14px;height:14px;fill:none;stroke:#0b0c0e;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
/* 닉네임/PIN 입력 */
.write-nick-row{display:flex;gap:6px;margin-bottom:6px;}
.wni{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none;}
.wni:focus{border-color:rgba(198,241,53,.35);}
/* 주간 랭킹 변동 뱃지 */
.rank-change{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0;}
.rank-up{background:rgba(74,222,128,.12);color:#4ade80;}
.rank-down{background:rgba(248,113,113,.12);color:#f87171;}
.rank-new{background:rgba(198,241,53,.12);color:#c6f135;}
/* 시급 변동 뱃지 */
.wage-change{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;flex-shrink:0;}
.wage-up{background:rgba(74,222,128,.12);color:#4ade80;}
.wage-down{background:rgba(248,113,113,.12);color:#f87171;}
.comm-write{flex-shrink:0;padding:10px var(--px) calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--bg2);}
.write-row{display:flex;gap:8px;align-items:flex-end;}
.write-ta{flex:1;min-width:0;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;resize:none;outline:none;line-height:1.5;max-height:90px;overflow-y:auto;-webkit-appearance:none;}
.write-ta:focus{border-color:rgba(198,241,53,.35);}
.write-ta::placeholder{color:var(--muted);}
.write-send{flex-shrink:0;width:42px;height:42px;background:var(--accent);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.write-send:active{opacity:.8;}
.write-send svg{width:18px;height:18px;fill:none;stroke:#0b0c0e;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.write-anon{font-size:10px;color:var(--muted);margin-top:6px;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg2);border:1px solid var(--accent);border-radius:10px;padding:9px 16px;font-size:13px;color:var(--accent);z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(min-width:600px){:root{--px:20px;}.grid{grid-template-columns:repeat(2,1fr);}.stat-val{font-size:22px;}}
@media(min-width:960px){
  :root{--px:28px;}
  .grid{grid-template-columns:repeat(3,1fr);}
  .modal-overlay,.comm-overlay{align-items:center;}
  .modal,.comm-sheet{border-radius:16px;width:min(500px,92vw);max-height:85vh;}
  .comm-sheet{max-height:80vh;}
  .modal-handle,.comm-handle{display:none;}
  .hero{flex-direction:row;align-items:flex-start;justify-content:space-between;}
  .hero-stats{min-width:280px;}
}

::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}

// 브라우저 fingerprint (IP 대체 — 기기+브라우저 조합)
function getFingerprint(){
  const s=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height,new Date().getTimezoneOffset()].join('|');
  let h=0;
  for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}
  return Math.abs(h).toString(36);
}

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return '방금';
  if(s<3600)return Math.floor(s/60)+'분 전';
  if(s<86400)return Math.floor(s/3600)+'시간 전';

}

async function saveWeeklySnapshot(){
  const WEEK=7*864e5;
  const snap=lsGet('weekly_snapshot',null);
  if(snap&&Date.now()-snap.ts<WEEK)return;
  const data={ts:Date.now(),ranks:{}};
  getSorted().forEach((g,i)=>{data.ranks[g.id]={rank:i+1,expert:g.expert};});
  lsSet('weekly_snapshot',data);
  try{await db.collection('snapshots').doc('weekly').set(data);}catch(e){}
}
function getWeeklySnap(){return lsGet('weekly_snapshot',null);}
function getRankChange(gid,currentRank){
  const snap=getWeeklySnap();if(!snap||!snap.ranks[gid])return null;
  const prev=snap.ranks[gid].rank;
  const diff=prev-currentRank;
  if(diff>0)return{type:'up',val:diff};
  if(diff<0)return{type:'down',val:Math.abs(diff)};
  return{type:'same'};
}
function getWageChange(gid,currentExpert){
  const snap=getWeeklySnap();if(!snap||!snap.ranks[gid])return null;
  const prev=snap.ranks[gid].expert;if(!prev)return null;
  const pct=Math.round((currentExpert-prev)/prev*100);
  if(Math.abs(pct)<5)return null;
  return{pct,type:pct>0?'up':'down'};
}

// ── 유사도 검사 ──
const normName=s=>s.toLowerCase().replace(/[\s\-\_\.]/g,'');
function isSimilar(a,b){
  const na=normName(a), nb=normName(b);
  if(na===nb)return true;
  if(na.includes(nb)||nb.includes(na))return true;
  if(na.length>=3&&nb.length>=3&&na.slice(0,3)===nb.slice(0,3))return true;
  return false;
}
function similarGames(input){
  if(!input||input.length<2)return{games:[],pending:[]};
  const simGames=games.filter(g=>isSimilar(input,g.name));
  const simPending=Object.values(pendingGames).filter(p=>isSimilar(input,p.name));
  return{games:simGames,pending:simPending};
}

// DB에 쌓인 pending 중 유사한 것들을 자동 병합
async function mergeSimilarPending(){
  const pList=Object.values(pendingGames);
  if(pList.length<2)return;
  const merged=new Set();
  const batch=db.batch();let changed=false;
  for(let i=0;i<pList.length;i++){
    if(merged.has(pList[i].id))continue;
    for(let j=i+1;j<pList.length;j++){
      if(merged.has(pList[j].id))continue;
      if(isSimilar(pList[i].name,pList[j].name)){
        // j를 i로 합침
        const ni=pList[i],nj=pList[j];
        const newCount=ni.count+nj.count;
        const newBegSum=ni.beginner_sum+nj.beginner_sum;
        const newExpSum=ni.expert_sum+nj.expert_sum;
        batch.update(db.collection('pending_games').doc(ni.id),{
          count:newCount,beginner_sum:newBegSum,expert_sum:newExpSum
        });
        batch.delete(db.collection('pending_games').doc(nj.id));
        pendingGames[ni.id]={...ni,count:newCount,beginner_sum:newBegSum,expert_sum:newExpSum};
        delete pendingGames[nj.id];
        merged.add(nj.id);changed=true;
        // 3표 달성 시 자동 등록
        if(newCount>=3){
          const newGame={id:'p-'+Date.now(),name:ni.name,icon:'🎮',tag:ni.tag||'기타',
            beginner:Math.round(newBegSum/newCount),expert:Math.round(newExpSum/newCount),
            upVotes:newCount,downVotes:0,ts:Date.now(),reportCount:newCount};
          games.push(newGame);
          batch.set(db.collection('games').doc(newGame.id),newGame);
          batch.delete(db.collection('pending_games').doc(ni.id));
          delete pendingGames[ni.id];
        }
      }
    }
  }
  if(changed)await batch.commit().catch(()=>{});
}

// ── FIRESTORE 데이터 로드 ──
async function loadData(){
  try{
    const gSnap=await db.collection('games').get();
    if(gSnap.empty){
      const batch=db.batch();
      DEFAULT.forEach(g=>batch.set(db.collection('games').doc(g.id),g));
      await batch.commit();
      games=JSON.parse(JSON.stringify(DEFAULT));
    }else{
      games=gSnap.docs.map(d=>({...d.data(),id:d.id}));
      // DB에 없는 신규 게임 자동 추가
      const existingIds=new Set(games.map(g=>g.id));
      const missing=DEFAULT.filter(g=>!existingIds.has(g.id));
      if(missing.length>0){
        const b=db.batch();
        missing.forEach(g=>b.set(db.collection('games').doc(g.id),g));
        await b.commit();
        games=[...games,...missing];
      }
    }
    const pSnap=await db.collection('posts').get();
    posts={};
    pSnap.docs.forEach(d=>{
      const data={...d.data(),id:d.id};
      if(!posts[data.gameId])posts[data.gameId]=[];
      posts[data.gameId].push(data);
    });
    // 게임별로 시드 게시글이 없으면 추가 (배치 500개 한도 분할)
    const seedItems=[];
    Object.entries(SEED_POSTS).forEach(([gid,list])=>{
      if(!posts[gid]||posts[gid].length===0){
        list.forEach(p=>seedItems.push({ref:db.collection('posts').doc(p.id),data:{...p,gameId:gid}}));
        posts[gid]=list.map(p=>({...p}));
      }
    });
    if(seedItems.length>0){
      const CHUNK=400;
      for(let i=0;i<seedItems.length;i+=CHUNK){
        const b=db.batch();
        seedItems.slice(i,i+CHUNK).forEach(({ref,data})=>b.set(ref,data));
        await b.commit();
      }
    }
    // pending 게임 로드
    const pgSnap=await db.collection('pending_games').get();
    pendingGames={};
    pgSnap.docs.forEach(d=>{pendingGames[d.id]={...d.data(),id:d.id};});
    // 유사한 pending 자동 병합
    await mergeSimilarPending();

    myVotes=lsGet('ssalmuk_votes',{});
    myPostLikes=lsGet('ssalmuk_postlikes',{});
  }catch(e){
    console.error('loadData error:',e);
    games=JSON.parse(JSON.stringify(DEFAULT));
    posts=JSON.parse(JSON.stringify(SEED_POSTS));
    pendingGames={};
    myVotes=lsGet('ssalmuk_votes',{});
    myPostLikes=lsGet('ssalmuk_postlikes',{});
  }
}

function checkAutoDelete(){
  const now=Date.now(),TWO_DAYS=172800000;
  const batch=db.batch();let changed=false;
  games=games.filter(g=>{
    const total=g.upVotes+g.downVotes;if(!total)return true;
    const dp=g.downVotes/total;
    if(dp>0.4){
      if(!g.warnedAt){g.warnedAt=now;batch.update(db.collection('games').doc(g.id),{warnedAt:now});changed=true;}
      else if(now-g.warnedAt>TWO_DAYS){batch.delete(db.collection('games').doc(g.id));changed=true;return false;}
    }else if(g.warnedAt){g.warnedAt=null;batch.update(db.collection('games').doc(g.id),{warnedAt:null});changed=true;}
    return true;
  });
  if(changed)batch.commit().catch(()=>{});
}

      </div>`;
    grid.appendChild(el);
  });
}
function renderAll(){renderStats();renderChart();renderCards();saveWeeklySnapshot();}

// ── 투표 ──
async function vote(id,dir){
  const g=games.find(x=>x.id===id);if(!g)return;
  const prev=myVotes[id];
  if(prev===dir){
    if(dir==='up')g.upVotes=Math.max(0,g.upVotes-1);
    else g.downVotes=Math.max(0,g.downVotes-1);
    delete myVotes[id];showToast('투표를 취소했습니다.');
  }else{
    if(prev==='up')g.upVotes=Math.max(0,g.upVotes-1);
    if(prev==='down')g.downVotes=Math.max(0,g.downVotes-1);
    if(dir==='up'){g.upVotes++;showToast('👍 신뢰 +1 반영됐습니다!');}
    else{g.downVotes++;showToast('👎 의심 +1 반영됐습니다.');}
    myVotes[id]=dir;
  }
  lsSet('ssalmuk_votes',myVotes);
  trackEvent('vote_click',{game_name:g.name,direction:dir});
  await db.collection('games').doc(id).update({upVotes:g.upVotes,downVotes:g.downVotes});
  renderAll();
}

// ── 제보 모달 ──
const EMOJI_LIST=['🎮','⚔️','🏰','🚢','🍁','🌬️','⚽','🗡️','💀','🌸','🔫','🧙','🏆','🛡️','🐉','🎯','🎲','🃏','💎','🏹','🔮','⚡','🌍','🚀','🧪','🎭','👑','🦁'];

function openReportModal(){
  populateGameSel();

  document.getElementById('fNewGameRow').style.display='none';
  document.getElementById('fTagRow').style.display='none';

}
function closeReportModal(){document.getElementById('reportOverlay').classList.remove('open');document.body.style.overflow='';}
function closeReportOut(e){if(e.target===document.getElementById('reportOverlay'))closeReportModal();}
async function submitReport(){
  const selVal=document.getElementById('fGameSel').value;
  const beg=parseInt(document.getElementById('fBeg').value)||0;
  const exp=parseInt(document.getElementById('fExp').value)||0;
  const icon=document.getElementById('fIcon').value.trim()||'🎮';
  if(!selVal){showToast('⚠️ 게임을 선택하거나 신규 등록을 선택해주세요.');return;}
  if(exp<=0){showToast('⚠️ 고수 시급을 입력해주세요.');return;}

  if(selVal==='NEW'){
    const name=document.getElementById('fName').value.trim();
    const tag=document.getElementById('fTag').value;
    if(!name){showToast('⚠️ 신규 게임명을 입력해주세요.');return;}
    const pendingKey='pending_submitted_'+normName(name);
    if(lsGet(pendingKey,false)){showToast('⚠️ 이미 이 게임을 제보하셨습니다.');return;}

    const pid=normName(name);
    const existing=pendingGames[pid];
    if(existing){
      const newCount=existing.count+1;
      const newBeg=Math.round((existing.beginner_sum+beg)/newCount);
      const newExp=Math.round((existing.expert_sum+exp)/newCount);
      await db.collection('pending_games').doc(pid).update({
        count:newCount,
        beginner_sum:existing.beginner_sum+beg,
        expert_sum:existing.expert_sum+exp
      });
      pendingGames[pid].count=newCount;
      pendingGames[pid].beginner_sum+=beg;
      pendingGames[pid].expert_sum+=exp;

      if(newCount>=3){
        const newGame={id:'p-'+Date.now(),name:existing.name,icon,tag:existing.tag||tag,
          beginner:newBeg,expert:newExp,upVotes:newCount,downVotes:0,ts:Date.now(),reportCount:newCount};
        games.push(newGame);
        await db.collection('games').doc(newGame.id).set(newGame);
        await db.collection('pending_games').doc(pid).delete();
        delete pendingGames[pid];
        showToast('🎉 3건 제보 달성! 새 게임이 등록됐습니다.');
      }else{
        showToast('');
        document.getElementById('reportOverlay').classList.remove('open');
        document.body.style.overflow='';
        showPendingMsg(name,newCount);
        ['fName','fBeg','fExp'].forEach(id=>document.getElementById(id).value='');
        renderAll();return;
      }
    }else{
      const newPending={name,tag,beginner_sum:beg,expert_sum:exp,count:1,ts:Date.now()};
      await db.collection('pending_games').doc(pid).set(newPending);
      pendingGames[pid]=newPending;
      lsSet(pendingKey,true);
      document.getElementById('reportOverlay').classList.remove('open');
      document.body.style.overflow='';
      showPendingMsg(name,1);
      ['fName','fBeg','fExp'].forEach(id=>document.getElementById(id).value='');
      renderAll();return;
    }
    lsSet(pendingKey,true);
  }else{
    const existing=games.find(g=>g.id===selVal);
    if(!existing)return;
    const reportKey='report_'+existing.id;
    if(lsGet(reportKey,false)){showToast('⚠️ 이미 이 게임에 제보하셨습니다.');return;}
    const expertDiff=Math.abs(exp-existing.expert)/existing.expert;
    const begDiff=existing.beginner>0?Math.abs(beg-existing.beginner)/existing.beginner:0;
    let weight=1;
    if(expertDiff>0.3||begDiff>0.3){showToast('⚠️ 현재 평균 대비 30% 이상 차이 — 반영 비중이 낮게 적용됩니다.');weight=0.1;}
    const rc=existing.reportCount||1;
    existing.beginner=Math.round((existing.beginner*rc+beg*weight)/(rc+weight));
    existing.expert=Math.round((existing.expert*rc+exp*weight)/(rc+weight));
    existing.reportCount=rc+1;
    await db.collection('games').doc(existing.id).update({beginner:existing.beginner,expert:existing.expert,reportCount:existing.reportCount});
    lsSet(reportKey,true);
    showToast(weight<1?'⚠️ 반영 비중 낮게 적용됐습니다.':'✅ 기존 데이터에 반영됐습니다!');
  }
  ['fName','fBeg','fExp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fIcon').value='🎮';
  trackEvent('report_submit',{is_new:selVal==='NEW'});
  closeReportModal();renderAll();
}

// ── 커뮤니티 ──
function trackEvent(name,params={}){if(typeof gtag==='function')gtag('event',name,params);}

function openComm(gid){
  commGameId=gid;
  const g=games.find(x=>x.id===gid);if(!g)return;
  trackEvent('comm_open',{game_name:g.name});
  document.getElementById('cIcon').textContent=g.icon||'🎮';
  document.getElementById('cTitle').textContent=g.name+' 커뮤니티';
  renderCommStats(gid);renderPosts(gid);
  document.getElementById('writeTa').value='';
  const savedNick=lsGet('ssalmuk_nick','');
  document.getElementById('writeNick').value=savedNick;
  document.getElementById('writePin').value='';
  document.getElementById('commOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeComm(){document.getElementById('commOverlay').classList.remove('open');document.body.style.overflow='';commGameId=null;}
function closeCommOut(e){if(e.target===document.getElementById('commOverlay'))closeComm();}
function renderCommStats(gid){
  const list=posts[gid]||[];
  const tl=totalLikes(gid),hot=list.length>=15;
  document.getElementById('cStatsBar').innerHTML=`
    <span class="comm-stat">글 <span>${list.length}</span></span>
    <span class="comm-stat">공감 <span>${tl}</span></span>
    ${hot?'<span class="comm-hot-tag">🔥 HOT</span>':''}`;
}
function renderPosts(gid){
  const allPosts=[...(posts[gid]||[])];
  const roots=allPosts.filter(p=>!p.parentId).sort((a,b)=>b.ts-a.ts);
  const container=document.getElementById('commPosts');
  if(!roots.length){container.innerHTML='<div class="comm-empty">아직 글이 없어요.<br>첫 번째로 떠들어보세요 👋</div>';return;}
  const myNick=lsGet('ssalmuk_nick','');
  container.innerHTML=roots.map(p=>{
    const liked=!!myPostLikes[p.id];
    const isMine=myNick&&p.nick===myNick;
    const replies=allPosts.filter(r=>r.parentId===p.id).sort((a,b)=>a.ts-b.ts);
    const replyHtml=replies.length?`<div class="reply-list">${replies.map(r=>{
      const rLiked=!!myPostLikes[r.id];
      const rMine=myNick&&r.nick===myNick;
      return `<div class="reply-item">
        <div class="post-meta">
          <div class="post-avatar" style="background:${r.color}22;color:${r.color};font-size:10px;">${r.nick.slice(-1)}</div>
          <span class="post-nick" style="color:${r.color};font-size:11px;">${escHtml(r.nick)}</span>
          <span class="post-time">${timeAgo(r.ts)}</span>
        </div>
        <div class="post-body" style="font-size:12px;">${escHtml(r.body)}</div>
        <div class="post-actions">
          <button class="post-like-btn ${rLiked?'liked':''}" onclick="likePost('${r.id}')">
            <span>${rLiked?'❤️':'🤍'}</span><span class="post-like-count">${r.likes}</span>
          </button>
          ${rMine?`<button class="post-mine-btn" onclick="editPost('${r.id}')">수정</button><button class="post-mine-btn" onclick="deletePost('${r.id}')">삭제</button>`:''}
        </div>
      </div>`;}).join('')}</div>`:'';
    return `<div class="post-item" id="post-${p.id}">
      <div class="post-meta">
        <div class="post-avatar" style="background:${p.color}22;color:${p.color};">${p.nick.slice(-1)}</div>
        <span class="post-nick" style="color:${p.color}">${escHtml(p.nick)}</span>
        <span class="post-time">${timeAgo(p.ts)}</span>
      </div>
      <div class="post-body">${escHtml(p.body)}</div>
      <div class="post-actions">
        <button class="post-like-btn ${liked?'liked':''}" onclick="likePost('${p.id}')">
          <span>${liked?'❤️':'🤍'}</span><span class="post-like-count">${p.likes}</span>
        </button>
        <button class="post-reply-btn" onclick="toggleReply('${p.id}')">💬 답글</button>
        ${isMine?`<button class="post-mine-btn" onclick="editPost('${p.id}')">수정</button><button class="post-mine-btn" onclick="deletePost('${p.id}')">삭제</button>`:''}
      </div>
      ${replyHtml}
      <div class="reply-write" id="reply-write-${p.id}">
        <div class="reply-nick-pin">
          <input class="rni" id="reply-nick-${p.id}" placeholder="닉네임" maxlength="12" value="${escHtml(myNick)}"/>
          <input class="rni" id="reply-pin-${p.id}" type="password" placeholder="PIN 4자리" maxlength="4" inputmode="numeric" style="width:90px;flex:none;"/>
        </div>
        <div class="reply-input-row">
          <textarea class="reply-ta" id="reply-ta-${p.id}" placeholder="답글을 입력하세요..." rows="1" oninput="autoResize(this)"></textarea>
          <button class="reply-send" onclick="submitReply('${p.id}')">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleReply(pid){
  const el=document.getElementById('reply-write-'+pid);
  if(!el)return;
  const isOpen=el.classList.contains('open');
  document.querySelectorAll('.reply-write.open').forEach(e=>e.classList.remove('open'));
  if(!isOpen){el.classList.add('open');el.querySelector('textarea').focus();}
}

async function submitReply(parentId){
  const gid=commGameId;if(!gid)return;
  const nick=document.getElementById('reply-nick-'+parentId).value.trim()||'익명';
  const pin=document.getElementById('reply-pin-'+parentId).value.trim();
  const ta=document.getElementById('reply-ta-'+parentId);
  const body=ta.value.trim();
  if(!body){showToast('내용을 입력해주세요.');return;}
  if(pin.length!==4){showToast('PIN 4자리를 입력해주세요.');return;}
  const color=randColor();
  const newReply={id:'r-'+Date.now(),nick,color,body,ts:Date.now(),likes:0,gameId:gid,parentId,pinHash:hashPin(pin)};
  if(!posts[gid])posts[gid]=[];
  posts[gid].push(newReply);
  await db.collection('posts').doc(newReply.id).set(newReply);
  lsSet('ssalmuk_nick',nick);
  ta.value='';ta.style.height='';
  document.getElementById('reply-write-'+parentId).classList.remove('open');
  renderCommStats(gid);renderPosts(gid);renderCards();
  showToast('✅ 답글이 등록됐습니다!');
}

async function deletePost(pid){
  const gid=commGameId;if(!gid)return;
  const list=posts[gid]||[];
  const post=list.find(p=>p.id===pid);if(!post)return;
  const pin=prompt('PIN 4자리를 입력하세요');
  if(!pin)return;
  if(hashPin(pin)!==post.pinHash){showToast('⚠️ PIN이 맞지 않습니다.');return;}
  posts[gid]=list.filter(p=>p.id!==pid&&p.parentId!==pid);
  const batch=db.batch();
  batch.delete(db.collection('posts').doc(pid));
  list.filter(p=>p.parentId===pid).forEach(r=>batch.delete(db.collection('posts').doc(r.id)));
  await batch.commit();
  renderCommStats(gid);renderPosts(gid);renderCards();
  showToast('🗑️ 삭제됐습니다.');
}

async function editPost(pid){
  const gid=commGameId;if(!gid)return;
  const list=posts[gid]||[];
  const post=list.find(p=>p.id===pid);if(!post)return;
  const pin=prompt('PIN 4자리를 입력하세요');
  if(!pin)return;
  if(hashPin(pin)!==post.pinHash){showToast('⚠️ PIN이 맞지 않습니다.');return;}
  const newBody=prompt('수정할 내용을 입력하세요',post.body);
  if(!newBody||!newBody.trim())return;
  post.body=newBody.trim();
  await db.collection('posts').doc(pid).update({body:post.body});
  renderCommStats(gid);renderPosts(gid);
  showToast('✅ 수정됐습니다.');
}

async function likePost(pid){
  const gid=commGameId;if(!gid)return;
  const list=posts[gid]||[];
  const post=list.find(p=>p.id===pid);if(!post)return;
  if(myPostLikes[pid]){post.likes=Math.max(0,post.likes-1);delete myPostLikes[pid];}
  else{post.likes++;myPostLikes[pid]=1;}
  lsSet('ssalmuk_postlikes',myPostLikes);
  await db.collection('posts').doc(pid).update({likes:post.likes});
  renderCommStats(gid);renderPosts(gid);renderCards();
}

async function submitPost(){
  const gid=commGameId;if(!gid)return;
  const nick=document.getElementById('writeNick').value.trim()||'익명';
  const pin=document.getElementById('writePin').value.trim();
  const ta=document.getElementById('writeTa');
  const body=ta.value.trim();
  if(!body){showToast('내용을 입력해주세요.');return;}
  if(body.length>300){showToast('300자 이내로 작성해주세요.');return;}
  if(pin.length!==4){showToast('PIN 4자리를 입력해주세요.');return;}
  const color=randColor();
  const newPost={id:'p-'+Date.now(),nick,color,body,ts:Date.now(),likes:0,gameId:gid,pinHash:hashPin(pin)};
  if(!posts[gid])posts[gid]=[];
  posts[gid].push(newPost);
  await db.collection('posts').doc(newPost.id).set(newPost);
  trackEvent('post_submit',{game_name:games.find(x=>x.id===gid)?.name||gid});
  lsSet('ssalmuk_nick',nick);
  ta.value='';ta.style.height='';
  document.getElementById('writePin').value='';
  renderCommStats(gid);renderPosts(gid);renderCards();
  document.getElementById('commPosts').scrollTop=0;
  showToast('✅ 글이 등록됐습니다!');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}
function showPendingMsg(name,count){
  const existing=document.getElementById('pendingMsg');
  if(existing)existing.remove();
  const div=document.createElement('div');
  div.id='pendingMsg';
  div.style.cssText='position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:24px;';
  div.innerHTML=`
    <div style="background:#13141a;border:1px solid rgba(198,241,53,.3);border-radius:16px;padding:28px 24px;max-width:340px;width:100%;text-align:center;">
      <div style="font-size:32px;margin-bottom:12px;">🌾</div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:18px;color:#c6f135;margin-bottom:8px;">제보 감사드립니다!</div>
      <div style="font-size:13px;color:#f0f0f2;line-height:1.7;margin-bottom:6px;"><strong style="color:#c6f135;">${name}</strong> 제보가 접수됐습니다.</div>
      <div style="font-size:12px;color:#7a7d8a;line-height:1.6;margin-bottom:6px;">새로운 게임은 심사를 통해 반영될 예정입니다.</div>
      <div style="font-size:11px;color:#5a5d6a;margin-bottom:20px;">현재 제보 ${count}/3건 — ${3-count}건 더 모이면 자동 등록됩니다</div>
      <button onclick="document.getElementById('pendingMsg').remove()"
        style="background:#c6f135;border:none;border-radius:8px;padding:11px 28px;color:#0b0c0e;font-size:14px;font-weight:700;cursor:pointer;">확인</button>
    </div>`;
  document.body.appendChild(div);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
let rTimer;
window.addEventListener('resize',()=>{clearTimeout(rTimer);rTimer=setTimeout(renderChart,180);});

// ── 시작 ──
(async()=>{
  await loadData();
  document.getElementById('loadingScreen').style.display='none';
  renderAll();
})();
</script>
